<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Books Management-Feature Search Branch</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="d-flex justify-content-between mb-3">
        <h2>Books Management</h2>

        <button
          class="btn btn-primary"
          data-bs-toggle="modal"
          data-bs-target="#bookModal"
        >
          <i class="bi bi-plus-circle"></i>
          Add Book
        </button>
      </div>

      <div class="mb-3">
        <input
          type="text"
          class="form-control"
          id="search"
          placeholder="Search Book"
        />
      </div>

      <table class="table table-bordered table-hover">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="bookTable"></tbody>
      </table>
    </div>

    <!-- Modal -->

    <div class="modal fade" id="bookModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5>Book Details</h5>

            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="book_id" />

            <div class="mb-3">
              <label>Title</label>

              <input type="text" id="title" class="form-control" />
            </div>

            <div class="mb-3">
              <label>Author</label>

              <input type="text" id="author" class="form-control" />
            </div>

            <div class="mb-3">
              <label>Category</label>

              <input type="text" id="category" class="form-control" />
            </div>

            <div class="mb-3">
              <label>Quantity</label>

              <input type="number" id="quantity" class="form-control" />
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-success" id="saveBook">Save</button>

            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const api = "http://13.233.128.66:3000/api/books";

      loadBooks();

      function loadBooks() {
        $.get(api, function (res) {
          let rows = "";

          res.forEach((book) => {
            rows += `

<tr>

<td>${book.book_id}</td>

<td>${book.title}</td>

<td>${book.author}</td>

<td>${book.category}</td>

<td>${book.quantity}</td>

<td>

<button
class="btn btn-warning btn-sm"
onclick="editBook(${book.book_id})">

Edit

</button>

<button
class="btn btn-danger btn-sm"
onclick="deleteBook(${book.book_id})">

Delete

</button>

</td>

</tr>

`;
          });

          $("#bookTable").html(rows);
        });
      }

      $("#saveBook").click(function () {
        const id = $("#book_id").val();

        const book = {
          title: $("#title").val(),

          author: $("#author").val(),

          category: $("#category").val(),

          quantity: $("#quantity").val(),
        };

        if (id == "") {
          $.ajax({
            url: api,

            type: "POST",

            contentType: "application/json",

            data: JSON.stringify(book),

            success: function () {
              location.reload();
            },
          });
        } else {
          $.ajax({
            url: api + "/" + id,

            type: "PUT",

            contentType: "application/json",

            data: JSON.stringify(book),

            success: function () {
              location.reload();
            },
          });
        }
      });

      function editBook(id) {
        $.get(api + "/" + id, function (res) {
          $("#book_id").val(res.book_id);

          $("#title").val(res.title);

          $("#author").val(res.author);

          $("#category").val(res.category);

          $("#quantity").val(res.quantity);

          new bootstrap.Modal(document.getElementById("bookModal")).show();
        });
      }

      function deleteBook(id) {
        if (confirm("Delete this book?")) {
          $.ajax({
            url: api + "/" + id,

            type: "DELETE",

            success: function () {
              location.reload();
            },
          });
        }
      }

      $("#search").keyup(function () {
        let value = $(this).val().toLowerCase();

        $("#bookTable tr").filter(function () {
          $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1);
        });
      });
    </script>
  </body>
</html>
