<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Students Management</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="d-flex justify-content-between mb-3">
        <h2>Students Management</h2>

        <button
          class="btn btn-primary"
          data-bs-toggle="modal"
          data-bs-target="#studentModal"
        >
          <i class="bi bi-plus-circle"></i>
          Add Student
        </button>
      </div>

      <div class="mb-3">
        <input
          type="text"
          class="form-control"
          id="search"
          placeholder="Search Student"
        />
      </div>

      <table class="table table-bordered table-hover">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Department</th>
            <th>Year</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="studentTable"></tbody>
      </table>
    </div>

    <div class="modal fade" id="studentModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5>Student Details</h5>

            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="student_id" />

            <div class="mb-3">
              <label>Name</label>

              <input type="text" id="name" class="form-control" />
            </div>

            <div class="mb-3">
              <label>Email</label>

              <input type="email" id="email" class="form-control" />
            </div>

            <div class="mb-3">
              <label>Phone</label>

              <input type="text" id="phone" class="form-control" />
            </div>

            <div class="mb-3">
              <label>Department</label>

              <input type="text" id="department" class="form-control" />
            </div>

            <div class="mb-3">
              <label>Year</label>

              <input type="number" id="year" class="form-control" />
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-success" id="saveStudent">Save</button>

            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const api = "http://13.233.128.66:3000/api/students";

      loadStudents();

      function loadStudents() {
        $.get(api, function (res) {
          let rows = "";

          res.data.forEach((student) => {
            rows += `
            <tr>
                <td>${student.student_id}</td>
                <td>${student.name}</td>
                <td>${student.email}</td>
                <td>${student.phone}</td>
                <td>${student.department}</td>
                <td>${student.academic_year}</td>
                <td>
                    <button class="btn btn-warning btn-sm"
                        onclick="editStudent(${student.student_id})">
                        Edit
                    </button>

                    <button class="btn btn-danger btn-sm"
                        onclick="deleteStudent(${student.student_id})">
                        Delete
                    </button>
                </td>
            </tr>
            `;
          });

          $("#studentTable").html(rows);
        });
      }

      $("#saveStudent").click(function () {
        console.log("Save button clicked");

        const id = $("#student_id").val();

        const student = {
          name: $("#name").val(),
          email: $("#email").val(),
          phone: $("#phone").val(),
          department: $("#department").val(),
          academic_year: $("#year").val(),
        };
        if (id == "") {
          $.ajax({
            url: api,

            type: "POST",

            contentType: "application/json",

            data: JSON.stringify(student),

            success: function () {
              location.reload();
            },
          });
        } else {
          $.ajax({
            url: api + "/" + id,

            type: "PUT",

            contentType: "application/json",

            data: JSON.stringify(student),

            success: function () {
              location.reload();
            },
          });
        }
      });

      function editStudent(id) {
        $.get(api + "/" + id, function (res) {
          const student = res.data[0];

          $("#student_id").val(student.student_id);
          $("#name").val(student.name);
          $("#email").val(student.email);
          $("#phone").val(student.phone);
          $("#department").val(student.department);
          $("#year").val(student.academic_year);

          new bootstrap.Modal(document.getElementById("studentModal")).show();
        });
      }
      function deleteStudent(id) {
        if (confirm("Delete this student?")) {
          $.ajax({
            url: api + "/" + id,

            type: "DELETE",

            success: function () {
              location.reload();
            },
          });
        }
      }

      $("#search").keyup(function () {
        let value = $(this).val().toLowerCase();

        $("#studentTable tr").filter(function () {
          $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1);
        });
      });
    </script>
  </body>
</html>
