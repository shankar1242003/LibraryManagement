<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Issue Books</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-4">
      <div class="d-flex justify-content-between mb-3">
        <h2>Issue Books</h2>

        <button
          class="btn btn-primary"
          data-bs-toggle="modal"
          data-bs-target="#issueModal"
        >
          Issue Book
        </button>
      </div>

      <table class="table table-bordered table-hover">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Book</th>
            <th>Student</th>
            <th>Issue Date</th>
            <th>Due Date</th>
            <th>Return Date</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="issueTable"></tbody>
      </table>
    </div>

    <!-- Modal -->

    <div class="modal fade" id="issueModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5>Issue Book</h5>

            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <div class="mb-3">
              <label>Book</label>

              <select id="book" class="form-select"></select>
            </div>

            <div class="mb-3">
              <label>Student</label>

              <select id="student" class="form-select"></select>
            </div>

            <div class="mb-3">
              <label>Issue Date</label>

              <input type="date" id="issue_date" class="form-control" />
            </div>

            <div class="mb-3">
              <label>Due Date</label>

              <input type="date" id="due_date" class="form-control" />
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-success" id="issueBook">Issue</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const issueAPI = "http://13.233.128.66:3000/api/issues";
      const bookAPI = "http://13.233.128.66:3000/api/books";
      const studentAPI = "http://13.233.128.66:3000/api/students";

      loadIssues();
      loadBooks();
      loadStudents();

      function loadIssues() {
        $.get(issueAPI, function (res) {
          let rows = "";

          res.data.forEach((issue) => {
            rows += `

<tr>

<td>${issue.issue_id}</td>

<td>${issue.title}</td>

<td>${issue.name}</td>

<td>${issue.issue_date}</td>

<td>${issue.due_date}</td>

<td>${issue.return_date ?? "-"}</td>

<td>${issue.status}</td>

<td>

${
  issue.status === "Issued"
    ? `<button class="btn btn-success btn-sm"
onclick="returnBook(${issue.issue_id})">

Return

</button>`
    : "Returned"
}

</td>

</tr>

`;
          });

          $("#issueTable").html(rows);
        });
      }

      function loadBooks() {
        $.get(bookAPI, function (res) {
          let option = "";

          res.data.forEach((book) => {
            option += `<option value="${book.book_id}">

${book.title}

</option>`;
          });

          $("#book").html(option);
        });
      }

      function loadStudents() {
        $.get(studentAPI, function (res) {
          let option = "";

          res.data.forEach((student) => {
            option += `<option value="${student.student_id}">

${student.name}

</option>`;
          });

          $("#student").html(option);
        });
      }

      $("#issueBook").click(function () {
        const data = {
          book_id: $("#book").val(),

          student_id: $("#student").val(),

          issue_date: $("#issue_date").val(),

          due_date: $("#due_date").val(),
        };

        $.ajax({
          url: issueAPI,

          type: "POST",

          contentType: "application/json",

          data: JSON.stringify(data),

          success: function () {
            alert("Book Issued Successfully");

            location.reload();
          },
        });
      });

      function returnBook(id) {
        const date = new Date().toISOString().split("T")[0];

        $.ajax({
          url: issueAPI + "/" + id + "/return",

          type: "PUT",

          contentType: "application/json",

          data: JSON.stringify({
            return_date: date,
          }),

          success: function () {
            alert("Book Returned");

            location.reload();
          },
        });
      }
    </script>
  </body>
</html>
