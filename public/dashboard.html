<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      body {
        background: #f4f6f9;
      }

      .sidebar {
        height: 100vh;
        background: #0d6efd;
        color: white;
      }

      .sidebar h3 {
        padding: 20px;
        text-align: center;
      }

      .sidebar a {
        display: block;
        color: white;
        text-decoration: none;
        padding: 15px 20px;
      }

      .sidebar a:hover {
        background: #084298;
      }

      .card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      .card h2 {
        font-size: 35px;
        font-weight: bold;
      }

      .navbar {
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#"> Library Management System </a>

        <div class="ms-auto">
          <button class="btn btn-light" id="logoutBtn">
            <i class="bi bi-box-arrow-right"></i>

            Logout
          </button>
        </div>
      </div>
    </nav>

    <div class="container-fluid">
      <div class="row">
        <div class="col-md-2 sidebar">
          <h3>Admin</h3>

          <a href="dashboard.html">
            <i class="bi bi-speedometer2"></i>
            Dashboard
          </a>

          <a href="books.html">
            <i class="bi bi-book"></i>
            Books
          </a>

          <a href="students.html">
            <i class="bi bi-people"></i>
            Students
          </a>

          <a href="issues.html">
            <i class="bi bi-journal-check"></i>
            Issue Books
          </a>
        </div>

        <div class="col-md-10 p-4">
          <h2 class="mb-4">Dashboard</h2>

          <div class="row g-4">
            <div class="col-md-3">
              <div class="card bg-primary text-white">
                <div class="card-body">
                  <h5>Total Books</h5>

                  <h2 id="totalBooks">0</h2>
                </div>
              </div>
            </div>

            <div class="col-md-3">
              <div class="card bg-success text-white">
                <div class="card-body">
                  <h5>Total Students</h5>

                  <h2 id="totalStudents">0</h2>
                </div>
              </div>
            </div>

            <div class="col-md-3">
              <div class="card bg-warning text-dark">
                <div class="card-body">
                  <h5>Issued Books</h5>

                  <h2 id="issuedBooks">0</h2>
                </div>
              </div>
            </div>

            <div class="col-md-3">
              <div class="card bg-danger text-white">
                <div class="card-body">
                  <h5>Returned Books</h5>

                  <h2 id="returnedBooks">0</h2>
                </div>
              </div>
            </div>
          </div>

          <div class="row mt-4">
            <div class="col-md-3">
              <div class="card bg-info text-white">
                <div class="card-body">
                  <h5>Available Books</h5>

                  <h2 id="availableBooks">0</h2>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
      $(document).ready(function () {
        loadDashboard();
      });

      function loadDashboard() {
        $.get(
          "http://localhost:3000/api/dashboard/total-books",
          function (res) {
            $("#totalBooks").text(res.data.total_books);
          },
        );

        $.get(
          "http://localhost:3000/api/dashboard/total-students",
          function (res) {
            $("#totalStudents").text(res.data.total_students);
          },
        );

        $.get(
          "http://localhost:3000/api/dashboard/issued-books",
          function (res) {
            $("#issuedBooks").text(res.data.issued_books);
          },
        );

        $.get(
          "http://localhost:3000/api/dashboard/returned-books",
          function (res) {
            $("#returnedBooks").text(res.data.returned_books);
          },
        );

        $.get(
          "http://localhost:3000/api/dashboard/available-books",
          function (res) {
            $("#availableBooks").text(res.data.available_books);
          },
        );
      }

      $("#logoutBtn").click(function () {
        window.location.href = "login.html";
      });
    </script>
  </body>
</html>
